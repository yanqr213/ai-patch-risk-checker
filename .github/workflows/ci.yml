name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Run example check
        run: python -m ai_patch_risk_checker.cli analyze --diff examples/auth-without-tests.diff --format json

      - name: Run SARIF smoke
        run: |
          python -m ai_patch_risk_checker.cli analyze --diff examples/auth-without-tests.diff --format sarif --output patch-risk.sarif
          python -m json.tool patch-risk.sarif > /dev/null
